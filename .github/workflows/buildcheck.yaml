name: buildcheck

on:
  pull_request:
  push:
  schedule:
    - cron: 0 4 8 * *

jobs:
  buildcheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - "1.21"
          - "1.22"
          - "1.23"
          - "1.24"
          - "1.25"
          - "1.26"

    steps:
      - uses: actions/checkout@v7

      - name: Create Docker Container
        run: |
          docker build . -t go-crontab-image --build-arg GO_VERSION=${{ matrix.go }}
          docker run --interactive --detach --volume ${{ github.workspace }}:/app --name go-crontab go-crontab-image

      - name: Coding Standards
        run: |
          docker exec go-crontab goimports -d -e .
          docker exec go-crontab test -z "$(goimports -l .)"

      - name: Check Dependencies
        run: docker exec go-crontab go mod download

      - name: Unit Tests
        run: docker exec go-crontab go test ./crontab/... -v -cover
