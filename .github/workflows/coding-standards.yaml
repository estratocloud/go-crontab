name: coding-standards

on: pull_request

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Create Docker Container
        run: |
          docker build . -t go-crontab-image --build-arg GO_VERSION=1.26
          docker run --interactive --detach --volume ${{ github.workspace }}:/app --name go-crontab go-crontab-image

      - name: Format Code
        run: docker exec go-crontab gofmt -w -e .

      - name: Push to GitHub
        run: ./.github/scripts/push.sh "go fmt"
